<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../startbootstrap-freelancer-gh-pages/scratch.html">
    <link href="../startbootstrap-freelancer-gh-pages/scratch.css" rel="stylesheet" />
    <title>Runner Game</title>
    <style>
        body {
            text-align: center;
            background-color: #f4f4f4;
            font-family: Arial;
        }

        h1 {
            color: #333;
        }

        #game {
            width: 800px;
            height: 200px;
            border: 2px solid black;
            margin: auto;
            background-color: white;
            position: relative;
            overflow: hidden;
        }

        #player {
            width: 40px;
            height: 40px;
            background-color: black;
            position: absolute;
            bottom: 0;
            left: 50px;
        }

        #obstacle {
            width: 20px;
            height: 40px;
            background-color: red;
            position: absolute;
            bottom: 0;
            right: -20px;
        }

        .jump {
            animation: jump 0.5s ease;
        }

        @keyframes jump {
            0% { bottom: 0; }
            50% { bottom: 100px; }
            100% { bottom: 0; }
        }

        #score {
            font-size: 20px;
            margin-top: 10px;
        }

        #gameOver {
            color: red;
            font-size: 24px;
            display: none;
        }
    </style>
</head>

<body>

<h1>Runner Game</h1>
<p>Press SPACE to jump</p>

<div id="game">
    <div id="player"></div>
    <div id="obstacle"></div>
</div>

<div id="score">Score: 0</div>
<div id="gameOver">Game Over - Refresh to Restart</div>

<script>
    const player = document.getElementById("player");
    const obstacle = document.getElementById("obstacle");
    const scoreDisplay = document.getElementById("score");
    const gameOverText = document.getElementById("gameOver");

    let score = 0;
    let gameSpeed = 5;
    let isGameOver = false;

    // Jump function
    document.addEventListener("keydown", function(event) {
        if (event.code === "Space" && !player.classList.contains("jump")) {
            player.classList.add("jump");
            setTimeout(() => {
                player.classList.remove("jump");
            }, 500);
        }
    });

    // Move obstacle
    function moveObstacle() {
        if (isGameOver) return;

        let obstacleLeft = 800;

        function frame() {
            if (isGameOver) return;

            obstacleLeft -= gameSpeed;
            obstacle.style.left = obstacleLeft + "px";

            let playerBottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));

            // Collision detection
            if (obstacleLeft < 90 && obstacleLeft > 40 && playerBottom < 40) {
                gameOver();
            }

            if (obstacleLeft < -20) {
                obstacleLeft = 800;
                score++;
                scoreDisplay.innerText = "Score: " + score;

                // Increase difficulty
                if (score % 5 === 0) {
                    gameSpeed += 0.5;
                }
            }

            requestAnimationFrame(frame);
        }

        frame();
    }

    function gameOver() {
        isGameOver = true;
        gameOverText.style.display = "block";
    }

    moveObstacle();
</script>

</body>
</html>
